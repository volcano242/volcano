mixed-port: 7890
allow-lan: false
mode: rule
log-level: silent
ipv6: true
unified-delay: true

hosts:
  dns.cloudflare.com: [1.1.1.1, 1.0.0.1]
  dns.google: [8.8.8.8, 8.8.4.4]

dns:
  enable: true
  ipv6: true
  prefer-h3: false
  use-hosts: true
  use-system-hosts: true
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - 'rule-set:fakeip-filter'
  default-nameserver:
    - 114.114.114.114
    - 223.5.5.5
    - system
  direct-nameserver:
    - 114.114.114.114
    - 223.5.5.5
    - system
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  nameserver:
    - https://dns.cloudflare.com/dns-query
    - https://dns.google/dns-query

tun:
  enable: false
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  device: "TUN"
  dns-hijack:
    - any:53
    - tcp://any:53
    

proxy-providers:
  Zeus:
    type: http
    url: "subscription_url"
    interval: 3600
    path: ./proxy_providers/Zeus.yaml
    health-check:
      enable: true
      interval: 60
      url: https://cp.cloudflare.com/generate_204
      lazy: false
    proxy: DIRECT
    exclude-filter: "(?i)剩余|重置|套餐|流量|到期|有效期|官网|官址|网址|过期|Expire|Expiry|Traffic|Usage|Quota|Reset|Balance|Info|通知|公告|说明|教程"
    header:
      User-Agent:
        - "Clash-Verge/v2.4.7"

proxy-groups:
  - name: Proxies
    icon: https://gh-proxy.org/https://raw.githubusercontent.com/volcano242/volcano/main/Icons/Google.png
    type: select
    proxies:
      - HK
      - SG
      - JP
      - Other

  - name: Telegram
    icon: https://gh-proxy.org/https://raw.githubusercontent.com/volcano242/volcano/main/Icons/Telegram.png
    type: select
    proxies:
      - SG
      - HK
      - JP
      - Other

  - name: AI Service
    icon: https://gh-proxy.org/https://raw.githubusercontent.com/volcano242/volcano/main/Icons/ChatGPT.png
    type: select
    use:
      - Zeus
    filter: "(?i)^(?!.*(港|HK|Hong|Kong|澳|Macau|🇭🇰)).*"




  - name: Final
    icon: https://gh-proxy.org/https://raw.githubusercontent.com/volcano242/volcano/main/Icons/Final.png
    type: select
    proxies:
      - HK
      - SG
      - JP
      - Other
      - DIRECT

  - name: HK
    icon: https://gh-proxy.org/https://raw.githubusercontent.com/volcano242/volcano/main/Icons/HK.png
    type: select
    use:
      - Zeus
    filter: "(?i)港|HK|Hong|Kong|🇭🇰"

  - name: SG
    icon: https://gh-proxy.org/https://raw.githubusercontent.com/volcano242/volcano/main/Icons/SG.png
    type: select
    use:
      - Zeus
    filter: "(?i)坡|狮城|獅城|SG|Singapore|🇸🇬"

  - name: JP
    icon: https://gh-proxy.org/https://raw.githubusercontent.com/volcano242/volcano/main/Icons/JP.png
    type: select
    use:
      - Zeus
    filter: "(?i)日本|JP|Japan|🇯🇵"   

  - name: Other
    icon: https://gh-proxy.org/https://raw.githubusercontent.com/volcano242/volcano/main/Icons/Plane.png
    type: select
    use:
      - Zeus
    filter: "(?i)^(?!.*(港|HK|Hong|Kong|🇭🇰|坡|狮城|獅城|SG|Singapore|🇸🇬|日本|JP|Japan|🇯🇵)).*"


rule-providers:
  banad:
    type: http
    behavior: domain
    format: mrs
    url: "https://gh-proxy.org/https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Clash.mrs"
    path: ./rule_providers/banad.mrs
    interval: 86400
  proxy:
    type: http
    behavior: domain
    format: mrs
    url: "https://gh-proxy.org/https://raw.githubusercontent.com/volcano242/volcano/rules-output/mrs/proxy.mrs"
    path: ./rule_providers/proxy.mrs
    interval: 86400
  direct-domain:
    type: http
    behavior: domain
    format: mrs
    url: "https://gh-proxy.org/https://raw.githubusercontent.com/volcano242/volcano/rules-output/mrs/direct.mrs"
    path: ./rule_providers/direct-domain.mrs
    interval: 86400
  direct-ip:
    type: http
    behavior: ipcidr
    format: mrs
    url: "https://gh-proxy.org/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs"
    path: ./rule_providers/direct-ip.mrs
    interval: 86400
  telegram-domain:
    type: http
    behavior: domain
    format: mrs
    url: "https://gh-proxy.org/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/telegram.mrs"
    path: ./rule_providers/telegram-domain.mrs
    interval: 86400
  telegram-ip:
    type: http
    behavior: ipcidr
    format: mrs
    url: "https://gh-proxy.org/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/telegram.mrs"
    path: ./rule_providers/telegram-ip.mrs
    interval: 86400
  ai:
    type: http
    behavior: domain
    format: mrs
    url: "https://gh-proxy.org/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ai-!cn.mrs"
    path: ./rule_providers/ai.mrs
    interval: 86400
  games-download:
    type: http
    behavior: domain
    format: mrs
    url: "https://gh-proxy.org/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-game-platforms-download.mrs"
    path: ./rule_providers/games-download.mrs
    interval: 86400
  private-domain:
    type: http
    behavior: domain
    format: mrs
    url: "https://gh-proxy.org/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"
    path: ./rule_providers/private-domain.mrs
    interval: 86400
  private-ip:
    type: http
    behavior: ipcidr
    format: mrs
    url: "https://gh-proxy.org/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/private.mrs"
    path: ./rule_providers/private-ip.mrs
    interval: 86400
  apple-update:
    type: http
    behavior: domain
    format: mrs
    url: "https://gh-proxy.org/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/apple-update.mrs"
    path: ./rule_providers/apple-update.mrs
    interval: 86400
  win-update:
    type: http
    behavior: domain
    format: mrs
    url: "https://gh-proxy.org/https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/win-update.mrs"
    path: ./rule_providers/win-update.mrs
    interval: 86400
  fakeip-filter:
    type: http
    behavior: domain
    format: mrs
    url: "https://gh-proxy.org/https://raw.githubusercontent.com/volcano242/volcano/rules-output/mrs/fakeip-filter.mrs"
    path: ./rule_providers/fakeip-filter.mrs
    interval: 86400
  scholar:
    type: http
    behavior: domain
    format: mrs
    url: "https://gh-proxy.org/https://raw.githubusercontent.com/volcano242/volcano/rules-output/mrs/scholar.mrs"
    path: ./rule_providers/scholar.mrs
    interval: 86400  
rules:
  - RULE-SET,banad,REJECT
  - RULE-SET,private-domain,DIRECT
  - RULE-SET,private-ip,DIRECT, no-resolve
  - RULE-SET,games-download,DIRECT
  - RULE-SET,apple-update,DIRECT
  - RULE-SET,win-update,DIRECT
  - RULE-SET,scholar,DIRECT  
  - RULE-SET,ai, AI Service
  - RULE-SET,telegram-domain, Telegram
  - RULE-SET,telegram-ip, Telegram, no-resolve
  - RULE-SET,proxy, Proxies
  - RULE-SET,direct-domain,DIRECT
  - RULE-SET,direct-ip,DIRECT, no-resolve
  - MATCH, Final
