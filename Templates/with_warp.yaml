mixed-port: 7890
allow-lan: false
mode: rule
log-level: silent
ipv6: true
unified-delay: true
profile:
  store-selected: true


dns:
  enable: true
  ipv6: true
  use-system-hosts: true
  respect-rules: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - 'rule-set:fakeip-filter'
  nameserver:
    - system

tun:
  enable: false
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  device: "TUN"
  dns-hijack:
    - any:53
    - tcp://any:53
    
proxy-providers:
  Zeus:
    type: http
    url: "subscription_url"
    interval: 10800
    path: ./proxy_providers/Zeus.yaml
    health-check:
      enable: true
      interval: 600
      url: https://cp.cloudflare.com/generate_204
      lazy: false
    proxy: DIRECT
    exclude-filter: "(?i)剩余|重置|套餐|流量|到期|有效期|官网|官址|网址|过期|Expire|Expiry|Traffic|Usage|Quota|Reset|Balance|Info|通知|公告|说明"
    header:
      User-Agent:
        - "Clash-Verge/v2.4.6"

proxies:
  - name: Warp
    type: wireguard
    server: engage.cloudflareclient.com
    port: 2408
    ip: 172.16.0.2/32
    ipv6: 2606:4700:110:860e:81e0:831b:b5d0:c35e/128
    private-key: 2K80hxLfM1jO6vyd2s6yJcvxdGQ+ohQbubCW5vVdUFw=
    public-key: bmXOC+F1FxEMF9dyiK2H5/1SUtzH0JuVo51h2wPfgyo=
    udp: true
    mtu: 1280
    remote-dns-resolve: true
    dns: [ 1.1.1.1, 8.8.8.8 ]
    dialer-proxy: Warp Upstream


proxy-groups:
  - name: Proxies
    icon: https://gh-proxy.org/https://raw.githubusercontent.com/volcano242/volcano/main/Icons/Google.png
    type: select
    proxies:
      - HK
      - SG
      - JP
      - Other

  - name: Telegram
    icon: https://gh-proxy.org/https://raw.githubusercontent.com/volcano242/volcano/main/Icons/Telegram.png
    type: select
    proxies:
      - SG
      - HK
      - JP
      - Other


  - name: Youtube
    icon: https://gh-proxy.org/https://raw.githubusercontent.com/volcano242/volcano/main/Icons/Youtube.png
    type: select
    proxies:
      - HK    
      - SG
      - JP
      - Other

  - name: Warp Upstream
    icon: https://gh-proxy.org/https://raw.githubusercontent.com/volcano242/volcano/main/Icons/Warp.png
    type: select
    include-all: true
    filter: "(?i)^(?!.*(港|HK|Hong|Kong|澳|Macau|🇭🇰|Warp)).*"
    url: https://cp.cloudflare.com/generate_204
    
  - name: AI Service
    icon: https://gh-proxy.org/https://raw.githubusercontent.com/volcano242/volcano/main/Icons/ChatGPT.png
    type: select
    include-all: true
    filter: "(?i)^(?!.*(港|HK|Hong|Kong|澳|Macau|🇭🇰)).*"

  - name: Final
    icon: https://gh-proxy.org/https://raw.githubusercontent.com/volcano242/volcano/main/Icons/Final.png
    type: select
    proxies:
      - HK
      - SG
      - JP
      - Other
      - DIRECT

    

  - name: HK
    icon: https://gh-proxy.org/https://raw.githubusercontent.com/volcano242/volcano/main/Icons/HK.png
    type: select
    use:
      - Zeus
    filter: "(?i)港|HK|Hong|Kong|🇭🇰"

  - name: SG
    icon: https://gh-proxy.org/https://raw.githubusercontent.com/volcano242/volcano/main/Icons/SG.png
    type: select
    use:
      - Zeus
    filter: "(?i)坡|狮城|獅城|SG|Singapore|🇸🇬"

  - name: JP
    icon: https://gh-proxy.org/https://raw.githubusercontent.com/volcano242/volcano/main/Icons/JP.png
    type: select
    use:
      - Zeus
    filter: "(?i)日本|JP|Japan|🇯🇵"   

  - name: Other
    icon: https://gh-proxy.org/https://raw.githubusercontent.com/volcano242/volcano/main/Icons/Plane.png
    type: select
    use:
      - Zeus
    filter: "(?i)^(?!.*(港|HK|Hong|Kong|🇭🇰|坡|狮城|獅城|SG|Singapore|🇸🇬|日本|JP|Japan|🇯🇵)).*"


