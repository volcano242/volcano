rules:
  - RULE-SET,direct-extra,DIRECT
  - RULE-SET,proxy-extra, 泛用代理  
  - RULE-SET,connectivity-check,DIRECT
  - RULE-SET,private-domain,DIRECT
  - RULE-SET,private-ip,DIRECT, no-resolve
  - RULE-SET,games-download,DIRECT
  - RULE-SET,apple-update,DIRECT
  - RULE-SET,win-update,DIRECT  
  - RULE-SET,banad, REJECT
  - RULE-SET,youtube, 油管视频
  - RULE-SET,ai, AI平台
  - RULE-SET,telegram-domain, 电报消息
  - RULE-SET,telegram-ip, 电报消息, no-resolve
  - RULE-SET,google@cn, 泛用代理
  - RULE-SET,proxy, 泛用代理
  - RULE-SET,cn-domain,DIRECT
  - RULE-SET,cn-ip,DIRECT, no-resolve
  - MATCH, 兜底策略
