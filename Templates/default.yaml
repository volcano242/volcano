mixed-port: 7890
allow-lan: false
mode: rule
log-level: silent
ipv6: false
unified-delay: true
external-controller: 127.0.0.1:9090
secret: "controller_secret"
external-ui: Zashboard
external-ui-url: "https://gcore.jsdelivr.net/gh/volcano242/volcano@main/zashboard.zip"
profile:
  store-selected: true



dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-filter:
    - 'rule-set:fakeip-filter'
  default-nameserver:
    - 223.5.5.5
    - 114.114.114.114
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  nameserver-policy:
    'rule-set:private-domain': system
    'rule-set:connectivity-check': system    
    '+.edu.cn': system


proxy-providers:
  Zeus:
    type: http
    url: "subscription_url"
    interval: 10800
    path: ./proxy_providers/Zeus.yaml
    health-check:
      enable: true
      interval: 600
      url: https://cp.cloudflare.com/generate_204
      lazy: false
    proxy: DIRECT
    exclude-filter: "(?i)剩余|重置|套餐|流量|到期|有效期|官网|官址|网址|过期|Expire|Expiry|Traffic|Usage|Quota|Reset|Balance|Info|通知|公告|说明"
    header:
      User-Agent:
        - "Clash-Verge/v2.4.4"

proxy-groups:
  - name: 泛用代理
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/Google.png
    type: select
    proxies:
      - 香港节点
      - 狮城节点
      - 日本节点
      - 其余节点

  - name: 电报消息
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/Telegram.png
    type: select
    proxies:
      - 狮城节点
      - 香港节点
      - 日本节点
      - 其余节点

  - name: AI平台
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/ChatGPT.png
    type: select
    use:
      - Zeus
    filter: "(?i)^(?!.*(港|HK|Hong|Kong|澳|Macau|🇭🇰)).*"

  - name: 油管视频
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/Youtube.png
    type: select
    proxies:
      - 香港节点    
      - 狮城节点
      - 日本节点
      - 其余节点

  - name: 兜底策略
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/Final.png
    type: select
    proxies:
      - 香港节点
      - 狮城节点
      - 日本节点
      - 其余节点
      - DIRECT

  - name: 香港节点
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/HK.png
    type: select
    use:
      - Zeus
    filter: "(?i)港|HK|Hong|Kong|🇭🇰"

  - name: 狮城节点
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/SG.png
    type: select
    use:
      - Zeus
    filter: "(?i)坡|狮城|獅城|SG|Singapore|🇸🇬"

  - name: 日本节点
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/JP.png
    type: select
    use:
      - Zeus
    filter: "(?i)日本|JP|Japan|🇯🇵"


  - name: 其余节点
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/Airport.png
    type: select
    use:
      - Zeus
    filter: "(?i)^(?!.*(港|HK|Hong|Kong|🇭🇰|坡|狮城|獅城|SG|Singapore|🇸🇬|日本|JP|Japan|🇯🇵)).*"


rule-providers:
