mixed-port: 7890
allow-lan: false
mode: rule
log-level: silent
ipv6: true
unified-delay: true
profile:
  store-selected: true



dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-filter:
    - 'rule-set:fakeip-filter'
  default-nameserver:
    - 223.5.5.5
    - 114.114.114.114
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  nameserver-policy:
    'rule-set:private-domain': system
    'rule-set:connectivity-check': system    
    '+.edu.cn': system


proxy-providers:
  Zeus:
    type: http
    url: "subscription_url"
    interval: 10800
    proxy: 订阅更新
    path: ./proxy_providers/Zeus.yaml
    health-check:
      enable: true
      interval: 600
      url: https://captive.apple.com
      lazy: true
    header:
     User-Agent:
      - "Clash-Verge/v2.4.4"

proxy-groups:
  - name: 泛用代理
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/Google.png
    type: select
    proxies:
      - 香港节点
      - 台湾节点
      - 狮城节点
      - 日本节点
      - 美国节点
      - 其余节点
      - DIRECT

  - name: 电报消息
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/Telegram.png
    type: select
    proxies:
      - 狮城节点
      - 香港节点
      - 台湾节点
      - 日本节点
      - 美国节点
      - 其余节点
      - DIRECT

  - name: AI平台
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/ChatGPT.png
    type: select
    use:
      - Zeus
    filter: "(新加坡|坡|狮城|獅城|SG|Singapore|美|US|GPT|Gemini)"


  - name: 油管视频
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/Youtube.png
    type: select
    proxies:
      - 狮城节点
      - 美国节点
      - 香港节点
      - 台湾节点
      - 日本节点
      - 其余节点
      - DIRECT

  - name: 哔哩哔哩
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/Bilibili.png
    type: select
    proxies:
      - DIRECT
      - 香港节点
      - 台湾节点


  - name: 全球学术
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/Scholar.png
    type: select
    proxies:
      - DIRECT
      - 狮城节点
      - 香港节点
      - 台湾节点
      - 日本节点
      - 美国节点
      - 其余节点
    

  - name: 广告拦截
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/AdGuard.png
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: 历劫归墟
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/TaiChi.png
    type: select
    proxies:
      - 香港节点
      - 台湾节点
      - 狮城节点
      - 日本节点
      - 美国节点
      - 其余节点
      - DIRECT

  - name: 订阅更新
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/Loop.png
    type: select
    proxies:
      - DIRECT    
      - 香港节点
      - 台湾节点
      - 狮城节点
      - 日本节点
      - 美国节点
      - 其余节点


  - name: 香港节点
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/HK.png
    type: select
    use:
      - Zeus
    filter: "(?i)港|HK|Hong|Kong"

  - name: 日本节点
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/JP.png
    type: select
    use:
      - Zeus
    filter: "(?i)日|JP|Japan"

  - name: 美国节点
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/US.png
    type: select
    use:
      - Zeus
    filter: "(?i)美|US|United States"

  - name: 台湾节点
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/CN.png
    type: select
    use:
      - Zeus
    filter: "(?i)台|臺|TW"

  - name: 狮城节点
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/SG.png
    type: select
    use:
      - Zeus
    filter: "(?i)新加坡|新加坡|坡|狮城|獅城|SG|Singapore"

  - name: 其余节点
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/Olympic.png
    type: select
    use:
      - Zeus
    filter: "(?i)^(?!.*(港|HK|Hong|Kong|日|JP|Japan|美|US|United States|台|臺|TW|Tai|Wan|新加坡|新加坡|坡|狮城|獅城|SG|Singapore|GPT|Gemini)).*"


