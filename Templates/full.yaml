  - RULE-SET,games-download,DIRECT
  - RULE-SET,apple-update,DIRECT
  - RULE-SET,win-update,DIRECT  
  - RULE-SET,banad, 广告拦截
  - RULE-SET,scholar, 全球学术
  - RULE-SET,youtube, 油管视频
  - RULE-SET,bilibili-ip, 哔哩哔哩, no-resolve
