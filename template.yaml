mixed-port: 7890
allow-lan: false
bind-address: 0.0.0.0
mode: rule
log-level: silent
ipv6: true
unified-delay: true




dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-filter:
    - 'rule-set:ntp'
    - "rule-set:connectivity-check"
    - "rule-set:private"
    - '+.edu.cn'
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  nameserver-policy:
    '+.edu.cn': system
    'rule-set:connectivity-check': system
    'rule-set:private': system
    'rule-set:ntp': system


proxy-providers:
  airport:
    type: http
    url: "subscription_url"
    interval: 10800
    path: ./proxy_providers/airport.yaml
    health-check:
      enable: false
    header:
     User-Agent:
      - "Clash-Verge/v2.4.4"

proxy-groups:
  - name: 泛用代理
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/Google.png
    type: select
    proxies:
      - 香港-智能优选
      - 台湾-手动选择
      - 狮城-智能优选
      - 日本-手动选择
      - 美国-智能优选
      - 其他-手动选择
      - DIRECT

  - name: 电报消息
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/Telegram.png
    type: select
    proxies:
      - 狮城-智能优选
      - 香港-智能优选
      - 台湾-手动选择
      - 日本-手动选择
      - 美国-智能优选
      - 其他-手动选择
      - DIRECT

  - name: AI平台
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/ChatGPT.png
    type: select
    use:
      - airport
    filter: "(新加坡|坡|狮城|SG|Singapore|美|US|GPT|Gemini)"

  - name: 油管视频
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/Youtube.png
    type: select
    proxies:
      - 美国-智能优选
      - 狮城-智能优选
      - 香港-智能优选
      - 台湾-手动选择
      - 日本-手动选择
      - 其他-手动选择
      - DIRECT

  - name: 哔哩哔哩
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/Bilibili.png
    type: select
    proxies:
      - DIRECT
      - 香港-智能优选
      - 台湾-手动选择


  - name: 全球学术
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/Scholar.png
    type: select
    proxies:
      - DIRECT
      - 狮城-智能优选
      - 香港-智能优选
      - 台湾-手动选择
      - 日本-手动选择
      - 美国-智能优选
      - 其他-手动选择
    

  - name: 广告拦截
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/AdGuard.png
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: 历劫归墟
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/TaiChi.png
    type: select
    proxies:
      - 香港-智能优选
      - 台湾-手动选择
      - 狮城-智能优选
      - 日本-手动选择
      - 美国-智能优选
      - 其他-手动选择
      - DIRECT

  - name: 香港-智能优选
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/HK.png
    type: url-test
    use:
      - airport
    filter: "(?i)港|HK|Hong|Kong"
    url: https://cp.cloudflare.com/generate_204
    interval: 600
    tolerance: 30

  - name: 日本-手动选择
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/JP.png
    type: select
    use:
      - airport
    filter: "(?i)日|JP|Japan"

  - name: 美国-智能优选
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/US.png
    type: url-test
    use:
      - airport
    filter: "(?i)美|US|United States"
    url: https://cp.cloudflare.com/generate_204
    interval: 600
    tolerance: 50

  - name: 台湾-手动选择
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/CN.png
    type: select
    use:
      - airport
    filter: "(?i)台|TW|Tai|Wan"

  - name: 狮城-智能优选
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/SG.png
    type: url-test
    use:
      - airport
    filter: "(?i)新加坡|坡|狮城|SG|Singapore"
    url: https://cp.cloudflare.com/generate_204
    interval: 600
    tolerance: 30

  - name: 其他-手动选择
    icon: https://gcore.jsdelivr.net/gh/volcano242/volcano@main/Icons/UN.png
    type: select
    use:
      - airport
    filter: "(?i)^(?!.*(港|HK|Hong|Kong|日|JP|Japan|美|US|United States|台|TW|Tai|Wan|新加坡|坡|狮城|SG|Singapore)).*"


